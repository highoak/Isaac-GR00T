    <button onclick="selectPort()">Select Motor Port</button>
    <button onclick="startInference()">Start Inference</button>
    <video id="webcam" autoplay></video>

    <script>
        let ws;
        let serialPort;
        let writer;
        const videoElem = document.getElementById('webcam');

        async function connectWebSocket() {
            const url = document.getElementById('runpod-url').value;
            ws = new WebSocket(url);
            ws.onopen = () => console.log("Connected to RunPod!");
            ws.onmessage = async (event) => {
                const data = JSON.parse(event.data);
                if (data.write_commands && data.read_commands && writer) {
                    const reader = serialPort.readable.getReader();
                    console.log("reader", reader);

                    // Send write commands
                    for (const cmd of data.write_commands) {
                        await writer.write(new Uint8Array(cmd));
                        console.log("wrote command", cmd);
                    }

                    // Send read commands and collect responses
                    const responses = [];
                    for (const read_cmd of data.read_commands) {
                        await writer.write(new Uint8Array(read_cmd.command));
                        console.log("wrote read command", read_cmd.command);
                        const expected = read_cmd.length;
                        let buf = [];
                        while (buf.length < expected) {
                            const { value } = await reader.read();
                            if (value) buf.push(...value);
                        }
                        responses.push(buf.slice(0, expected));
                    }

                    reader.releaseLock();

                    // Send next frame and responses
                    const frame = captureFrame(videoElem);
                    ws.send(JSON.stringify({ image: frame, responses: responses }));
                }
            };
            ws.onerror = (err) => console.error("WebSocket error:", err);
        }

        async function selectPort() {
            try {
                serialPort = await navigator.serial.requestPort();
                await serialPort.open({ baudRate: 1000000 });
                writer = serialPort.writable.getWriter();
                console.log("Motor port selected and opened!");
            } catch (err) {
                console.error("Serial port error:", err);
            }
        }

        async function startInference() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert("Please connect to RunPod first!");
                return;
            }
            if (!serialPort || !writer) {
                alert("Please select the motor port first!");
                return;
            }

            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            videoElem.srcObject = stream;

            // Send initial message to start the loop
            const frame = captureFrame(videoElem);
            ws.send(JSON.stringify({ image: frame, responses: [] }));
        }

        function captureFrame(video) {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            return canvas.toDataURL('image/jpeg').split(',')[1];
        }
    </script>
