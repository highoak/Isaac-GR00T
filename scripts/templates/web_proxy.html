<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SO100 Robot Control</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        video { width: 640px; height: 480px; margin-top: 20px; }
        button, input { margin: 10px; padding: 5px 10px; }
    </style>
</head>
<body>
    <h1>SO100 Robot Control</h1>
    <input type="text" id="api-key" placeholder="RunPod API KEY" value="">
    <input type="text" id="worker-id" placeholder="Worker ID" value="kybzofxj9a0p63">
    <button onclick="wakeWorker()">Wake Worker</button>
    <input type="text" id="runpod-url" placeholder="auto-filled ws://IP:PORT" readonly>
    <button onclick="connectWebSocket()">Connect WS</button><br>
    <button onclick="selectPort()">Select Motor Port</button>
    <button onclick="startInference()">Start Inference</button>
    <button onclick="shutdownWorker()">Shutdown</button>
    <video id="webcam" autoplay></video>

    <script>
        let ws;
        let serialPort;
        let writer;
        const videoElem = document.getElementById('webcam');

        async function connectWebSocket() {
            const url = document.getElementById('runpod-url').value;
            ws = new WebSocket(url);
            ws.onopen = () => console.log("Connected to RunPod!");
            ws.onmessage = async (event) => {
                const data = JSON.parse(event.data);
                if (data.write_commands && data.read_commands && writer) {
                    const reader = serialPort.readable.getReader();
                    console.log("reader", reader);

                    // Send write commands
                    for (const cmd of data.write_commands) {
                        await writer.write(new Uint8Array(cmd));
                        console.log("wrote command", cmd);
                    }

                    // Send read commands and collect responses
                    const responses = [];
                    for (const read_cmd of data.read_commands) {
                        await writer.write(new Uint8Array(read_cmd.command));
                        console.log("wrote read command", read_cmd.command);
                        const expected = read_cmd.length;
                        let buf = [];
                        while (buf.length < expected) {
                            const { value } = await reader.read();
                            if (value) buf.push(...value);
                        }
                        responses.push(buf.slice(0, expected));
                    }

                    reader.releaseLock();

                    // Send next frame and responses
                    const frame = captureFrame(videoElem);
                    ws.send(JSON.stringify({ image: frame, responses: responses }));
                }
            };
            ws.onerror = (err) => console.error("WebSocket error:", err);
        }

        async function selectPort() {
            try {
                serialPort = await navigator.serial.requestPort();
                await serialPort.open({ baudRate: 1000000 });
                writer = serialPort.writable.getWriter();
                console.log("Motor port selected and opened!");
            } catch (err) {
                console.error("Serial port error:", err);
            }
        }

        async function startInference() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert("Please connect to RunPod first!");
                return;
            }
            if (!serialPort || !writer) {
                alert("Please select the motor port first!");
                return;
            }

            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            videoElem.srcObject = stream;

            // Send initial message to start the loop
            const frame = captureFrame(videoElem);
            ws.send(JSON.stringify({ image: frame, responses: [] }));
        }

        function captureFrame(video) {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            return canvas.toDataURL('image/jpeg').split(',')[1];
        }

        function shutdownWorker(){
            if(ws && ws.readyState===WebSocket.OPEN){
                ws.send("shutdown");
                ws.close();
                console.log("Shutdown signal sent");
            }
        }

        async function wakeWorker(){
            const key=document.getElementById('api-key').value.trim();
            const wid=document.getElementById('worker-id').value.trim();
            if(!key||!wid){alert('Fill API key and Worker ID');return;}
            const url=`https://api.runpod.ai/v2/${wid}/run`;
            try{
                const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},body:JSON.stringify({input:{wake:true}})});
                const run=await res.json();
                if(!run.id){console.error('No job id');return;}
                console.log("run", run.id);
                // poll status for ip/port
                const statusUrl=`https://api.runpod.ai/v2/${wid}/status/${run.id}`;
                const poll=setInterval(async()=>{
                    const st=await fetch(statusUrl,{headers:{'Authorization':`Bearer ${key}`}});
                    if(!st.ok) return;
                    const data=await st.json();
                    if(data.output && data.output.ip){
                        clearInterval(poll);
                        const wsUrl=`ws://${data.output.ip}:${data.output.port||8765}`;
                        document.getElementById('runpod-url').value=wsUrl;
                        console.log('Worker live at',wsUrl);
                    }
                },2000);
            }catch(e){console.error(e);}        
        }
    </script>
</body>
</html>
